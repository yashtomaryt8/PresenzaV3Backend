# Force Python 3.10 on Railway — insightface/onnx not yet compatible with 3.13
[phases.setup]
nixPkgs = ["python310", "gcc", "libgl1", "glib"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[start]
# 2 workers × 8 threads = 16 concurrent slots — enough for many devices scanning simultaneously
# gthread worker class allows threads to handle concurrent requests per worker
# timeout 60 kills stuck workers fast instead of holding sockets for 2 minutes
cmd = "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 8 --worker-class gthread --timeout 60 --keep-alive 5 --graceful-timeout 30"
