# Force Python 3.10 on Railway — insightface/onnx not yet compatible with 3.13
[phases.setup]
nixPkgs = ["python310", "gcc", "libgl1", "glib"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[start]
cmd = "python manage.py migrate && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
